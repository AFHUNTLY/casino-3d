<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Diamond Casino 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0608;font-family:system-ui,sans-serif}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;inset:0;pointer-events:none;z-index:100}
#ui>*{pointer-events:auto}
.topbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:linear-gradient(180deg,rgba(0,0,0,.7),transparent);z-index:101}
.logo{font-weight:800;font-size:22px;color:#ffd700;letter-spacing:2px;text-shadow:0 0 20px rgba(255,215,0,.5)}
.wallet{display:flex;align-items:center;gap:12px;background:rgba(20,20,30,.85);border:1px solid rgba(255,215,0,.25);border-radius:8px;padding:8px 16px;backdrop-filter:blur(10px)}
.wallet-addr{font-family:monospace;font-size:13px;color:#aaa}
.wallet-bal{font-size:15px;font-weight:700;color:#ffd700}
.connect-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:11px 26px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.connect-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.4)}
.crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;pointer-events:none;z-index:50}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.5)}
.crosshair::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
.crosshair::after{width:100%;height:2px;top:50%;transform:translateY(-50%)}
#overlay{display:none!important}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a1a2e,#0a0a0a);z-index:999}
#loading-title{font-size:48px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ff6b6b,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;margin-bottom:16px}
#loading-sub{color:#888;font-size:16px}
#spinner{margin-top:24px;width:36px;height:36px;border:3px solid rgba(255,215,0,.2);border-top-color:#ffd700;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* === GAME INTERACTION === */
#game-prompt{position:fixed;bottom:25%;left:50%;transform:translateX(-50%);background:rgba(20,20,30,.92);border:1px solid rgba(255,215,0,.4);border-radius:8px;padding:10px 24px;z-index:110;display:none;animation:fadeIn .2s}
#game-prompt span{color:#ffd700;font-weight:600;font-size:15px}
#game-prompt kbd{background:#333;border:1px solid #555;border-radius:4px;padding:2px 8px;color:#fff;font-size:13px;margin-right:6px}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* === GAME MODAL === */
#game-modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:300}
#game-modal-box{background:linear-gradient(135deg,#1a1520,#0d0a0f);border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:32px;min-width:400px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.8),0 0 80px rgba(255,215,0,.08)}
#game-modal-title{font-size:24px;font-weight:800;color:#ffd700;margin-bottom:8px;text-align:center}
#game-modal-sub{font-size:13px;color:#888;text-align:center;margin-bottom:20px}
.bet-row{display:flex;align-items:center;justify-content:space-between;margin:8px 0;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:8px}
.bet-row label{color:#ccc;font-size:14px}
.bet-row input,.bet-row select{background:rgba(0,0,0,.4);border:1px solid rgba(255,215,0,.2);color:#fff;padding:6px 12px;border-radius:6px;font-size:14px;font-family:monospace}
.bet-row input:focus{outline:none;border-color:rgba(255,215,0,.5)}
.btn-primary{display:block;width:100%;margin-top:16px;background:linear-gradient(135deg,#ffd700,#ff9500);color:#000;border:none;padding:12px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,215,0,.4)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{display:block;width:100%;margin-top:8px;background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.1);padding:10px;border-radius:8px;font-size:14px;cursor:pointer}
.btn-secondary:hover{background:rgba(255,255,255,.14)}
.result-box{margin-top:16px;padding:16px;border-radius:8px;text-align:center;font-size:18px;font-weight:700}
.result-win{background:rgba(0,255,100,.15);border:1px solid rgba(0,255,100,.3);color:#4f4}
.result-lose{background:rgba(255,50,50,.15);border:1px solid rgba(255,50,50,.3);color:#f44}
.result-pending{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);color:#ffd700}

/* === CHAT === */
#chat-panel{position:fixed;bottom:0;left:0;width:360px;z-index:110;pointer-events:none}
#chat-messages{max-height:180px;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:3px;pointer-events:auto;mask-image:linear-gradient(to top,black 60%,transparent);scrollbar-width:thin}
.chat-msg{font-size:13px;line-height:1.4;text-shadow:0 1px 3px rgba(0,0,0,.9);word-break:break-word;opacity:1;transition:opacity 8s}
.chat-msg.fade{opacity:.3}
.chat-name{font-weight:700}
.chat-system{color:#ffd700;font-style:italic}
#chat-hint{pointer-events:auto;background:rgba(0,0,0,.6);border-top:1px solid rgba(255,215,0,.15);border-radius:0 8px 0 0;padding:6px 14px;font-size:13px;color:#888;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px}
#chat-hint:hover{background:rgba(20,20,30,.8);color:#ccc}
#chat-hint kbd{background:#333;border:1px solid #555;border-radius:4px;padding:1px 7px;color:#fff;font-size:11px;font-family:monospace}
#chat-input-row{display:none;gap:6px;padding:6px;pointer-events:auto;background:rgba(0,0,0,.7);border-top:1px solid rgba(255,215,0,.2)}
#chat-input{flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(255,215,0,.3);color:#fff;padding:7px 12px;border-radius:6px;font-size:14px;outline:none}
#chat-input:focus{border-color:rgba(255,215,0,.6);box-shadow:0 0 10px rgba(255,215,0,.15)}
#chat-input-row.active{display:flex}

/* === ONLINE COUNTER === */
#online-counter{position:fixed;top:60px;right:24px;background:rgba(20,20,30,.85);border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:6px 14px;font-size:13px;color:#aaa;z-index:101}
#online-counter b{color:#4f4}

/* === MOBILE CONTROLS === */
#mobile-controls{display:none;position:fixed;inset:0;z-index:90;pointer-events:none}
#joystick{position:fixed;bottom:80px;left:60px;width:120px;height:120px;pointer-events:auto}
#joystick-base{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,215,0,.2);position:relative;touch-action:none}
#joystick-knob{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border-radius:50%;background:rgba(255,215,0,.3);border:2px solid rgba(255,215,0,.5);touch-action:none}
#look-area{position:fixed;bottom:0;right:0;width:50%;height:60%;pointer-events:auto;touch-action:none}
#mobile-play-btn{position:fixed;right:22px;bottom:210px;display:none;min-width:118px;padding:15px 18px;border-radius:999px;border:1px solid rgba(255,215,0,.55);background:linear-gradient(135deg,#ffd700,#ff9500);color:#080500;font-size:16px;font-weight:900;letter-spacing:.6px;box-shadow:0 8px 28px rgba(0,0,0,.45),0 0 22px rgba(255,215,0,.25);pointer-events:auto;touch-action:manipulation;z-index:111}
#mobile-play-btn:active{transform:scale(.96)}
@media (pointer:coarse) and (max-width:1024px){#mobile-controls{display:block} .crosshair{display:none!important} #game-prompt kbd{display:none} #game-prompt{bottom:24%;font-size:14px;padding:9px 16px;max-width:82vw;text-align:center} #joystick{left:22px;bottom:82px;width:112px;height:112px} #look-area{width:56%;height:58%;right:0;bottom:0} #mobile-play-btn{right:20px;bottom:172px} #game-modal{align-items:flex-end;padding:10px} #game-modal-box{min-width:0;width:100%;max-width:100%;max-height:78vh;border-radius:16px 16px 10px 10px;padding:20px 16px} #game-modal-title{font-size:20px}.bet-row{flex-direction:column;align-items:flex-start;gap:6px}.bet-row input,.bet-row select{width:100%!important}.btn-primary{padding:14px;font-size:17px}.btn-secondary{padding:13px}}
</style>
</head>
<body>
<canvas id="app"></canvas>

<div id="ui">
<div class="topbar">
<div class="logo">💎 DIAMOND CASINO</div>
<button class="connect-btn" id="connectBtn">🦊 Connect Wallet</button>
<div class="wallet" id="walletDisplay" style="display:none">
<span class="wallet-addr" id="walletAddr"></span>
<span class="wallet-bal" id="walletBal"></span>
</div>
</div>
<div class="crosshair" id="crosshair" style="display:none"></div>
<div id="game-prompt"><kbd>E</kbd><span id="game-prompt-text">Play</span></div>
<div id="overlay" aria-hidden="true"></div>
</div>

<div id="game-modal">
<div id="game-modal-box">
<div id="game-modal-title"></div>
<div id="game-modal-sub"></div>
<div id="game-modal-content"></div>
</div>
</div>

<div id="online-counter">Players: <b id="online-count">1</b></div>

<div id="chat-panel">
<div id="chat-messages"></div>
<div id="chat-input-row">
<input type="text" id="chat-input" placeholder="Type message..." maxlength="200" autocomplete="off"/>
</div>
<div id="chat-hint"><kbd>ENTER</kbd> to chat</div>
</div>

<div id="mobile-controls">
<div id="joystick"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
<div id="look-area"></div>
<button id="mobile-play-btn" type="button">PLAY</button>
</div>

<div id="loading">
<div id="loading-title">DIAMOND CASINO</div>
<div id="loading-sub">Loading 3D environment...</div>
<div id="spinner"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/playcanvas@2.20.5/build/playcanvas.min.js"></script>
<script src="provablyfair.js"></script>

<script>
window.onerror = function(msg, src, line, col, err) {
  var loading = document.getElementById('loading');
  if (loading) {
    loading.innerHTML = '<div style="color:#ff4444;font-size:16px;padding:20px;max-width:700px;text-align:center">' +
      '<b>⚠ Casino Error</b><br><br>' +
      '<pre style="font-size:12px;color:#aaa;text-align:left;white-space:pre-wrap">' +
      (msg || 'Unknown error') + (err && err.stack ? '\n\n' + err.stack : '') + '</pre></div>';
  }
  console.error('[CASINO ERROR]', msg, err);
  return true;
};

try {
var pc = window.pc;
if (!pc) throw new Error('PlayCanvas engine failed to load from CDN');
console.log('[Casino] PlayCanvas loaded, version:', pc.version || 'unknown');

// ===== INIT =====
const canvas = document.getElementById('app');
const app = new pc.Application(canvas, {
  keyboard: new pc.Keyboard(window),
  mouse: new pc.Mouse(canvas),
});
app.setCanvasFillMode(pc.FILLMODE_FILL_WINDOW);
app.setCanvasResolution(pc.RESOLUTION_AUTO);
app.graphicsDevice.maxPixelRatio = Math.min(window.devicePixelRatio, 2);

// Tone mapping for realistic lighting
app.scene.toneMapping = pc.TONEMAP_ACES;
app.scene.exposure = 1.2;

// Fog for atmosphere
app.scene.fog = pc.FOG_EXP2;
app.scene.fogColor = new pc.Color(0.04, 0.02, 0.06);
app.scene.fogDensity = 0.015;

// Ambient
app.scene.ambientLight = new pc.Color(0.15, 0.1, 0.08);

// ===== HELPER FUNCTIONS =====
function makeMat(color, emissive, emissiveInt, metalness, roughness) {
  const m = new pc.StandardMaterial();
  m.diffuse = new pc.Color(color[0], color[1], color[2]);
  if (emissive) {
    m.emissive = new pc.Color(emissive[0], emissive[1], emissive[2]);
    m.emissiveIntensity = emissiveInt || 1;
  }
  m.metalness = metalness ?? 0;
  m.shininess = roughness ? (100 - roughness * 100) : 50;
  m.update();
  return m;
}

function rgb(hex) {
  return [((hex>>16)&0xFF)/255, ((hex>>8)&0xFF)/255, (hex&0xFF)/255];
}

function makeBox(name, pos, scale, mat) {
  const e = new pc.Entity(name);
  e.addComponent('model', { type: 'box' });
  e.setLocalPosition(pos[0], pos[1], pos[2]);
  e.setLocalScale(scale[0], scale[1], scale[2]);
  if (mat) {
    const mi = e.model.meshInstances[0];
    if (mi) mi.material = mat;
  }
  app.root.addChild(e);
  return e;
}

function makeCylinder(name, pos, scale, mat) {
  const e = new pc.Entity(name);
  e.addComponent('model', { type: 'cylinder' });
  e.setLocalPosition(pos[0], pos[1], pos[2]);
  e.setLocalScale(scale[0], scale[1], scale[2]);
  if (mat) { const mi = e.model.meshInstances[0]; if (mi) mi.material = mat; }
  app.root.addChild(e);
  return e;
}

function makeSphere(name, pos, scale, mat) {
  const e = new pc.Entity(name);
  e.addComponent('model', { type: 'sphere' });
  e.setLocalPosition(pos[0], pos[1], pos[2]);
  e.setLocalScale(scale[0], scale[1], scale[2]);
  if (mat) { const mi = e.model.meshInstances[0]; if (mi) mi.material = mat; }
  app.root.addChild(e);
  return e;
}

function makeTorus(name, pos, scale, mat, rot) {
  const e = new pc.Entity(name);
  e.addComponent('model', { type: 'torus' });
  e.setLocalPosition(pos[0], pos[1], pos[2]);
  e.setLocalScale(scale[0], scale[1], scale[2]);
  if (rot) e.setLocalEulerAngles(rot[0], rot[1], rot[2]);
  if (mat) { const mi = e.model.meshInstances[0]; if (mi) mi.material = mat; }
  app.root.addChild(e);
  return e;
}

// ===== MATERIALS =====
const matMarbleWhite = makeMat(rgb(0xe8e0d5), null, 0, 0.1, 0.2);
const matMarbleBlack = makeMat(rgb(0x1a1614), null, 0, 0.1, 0.2);
const matWall = makeMat(rgb(0x2a1a12), null, 0, 0, 0.8);
const matCeiling = makeMat(rgb(0x0d0806), null, 0, 0, 0.9);
const matGold = makeMat(rgb(0xffd700), rgb(0x553300), 0.4, 0.9, 0.2);
const matRedCarpet = makeMat(rgb(0x4a0808), null, 0, 0, 0.95);
const matFelt = makeMat(rgb(0x0a3a1a), null, 0, 0, 0.9);
const matDarkWood = makeMat(rgb(0x1a0e08), null, 0, 0.2, 0.6);
const matGlowRed = makeMat(rgb(0x440000), rgb(0xff0000), 2.5, 0, 0.3);
const matGlowBlue = makeMat(rgb(0x000044), rgb(0x0044ff), 2.5, 0, 0.3);
const matGlowGold = makeMat(rgb(0x442200), rgb(0xffaa00), 2.5, 0, 0.3);
const matGlowPink = makeMat(rgb(0x440022), rgb(0xff0088), 2.5, 0, 0.3);
const matGlowGreen = makeMat(rgb(0x004400), rgb(0x00ff44), 2.5, 0, 0.3);
const matGlowWhite = makeMat(rgb(0x222222), rgb(0xffffff), 2.0, 0, 0.3);

const neonMats = [matGlowRed, matGlowBlue, matGlowGold, matGlowPink];
const slotCabinets = [
  { body: makeMat(rgb(0x2a0404), null, 0, 0.5, 0.4), screen: makeMat(rgb(0x110000), rgb(0xff0000), 2.5, 0, 0.2) },
  { body: makeMat(rgb(0x04081a), null, 0, 0.5, 0.4), screen: makeMat(rgb(0x000011), rgb(0x00aaff), 2.5, 0, 0.2) },
  { body: makeMat(rgb(0x1a1604), null, 0, 0.5, 0.4), screen: makeMat(rgb(0x111100), rgb(0xffd700), 2.5, 0, 0.2) },
  { body: makeMat(rgb(0x1a0414), null, 0, 0.5, 0.4), screen: makeMat(rgb(0x110011), rgb(0xff00ff), 2.5, 0, 0.2) },
];

// ===== ROOM DIMENSIONS =====
const RW = 60, RH = 14, RD = 60;

// ===== IMPORTED CASINO SCENE ALIGNMENT =====
// The Sketchfab casino scene, after scale/position fix, occupies roughly:
// X -9.7..9.7, Z -20.3..20.3, Y 0..8.1. Keep all playable items inside this.
const CASINO_BOUNDS = { minX: -8.9, maxX: 8.9, minZ: -19.5, maxZ: 19.5 };
const PLAYER_SPAWN = { x: 0, y: 1.7, z: 18.4, yaw: Math.PI };
const SLOT_LAYOUT = [];
for (let i = 0; i < 6; i++) {
  const z = -14 + i * 4.6;
  SLOT_LAYOUT.push({ x: -7.2, z, rotY: 90, variant: i });
  SLOT_LAYOUT.push({ x: -5.0, z, rotY: -90, variant: i + 6 });
  SLOT_LAYOUT.push({ x: 5.0, z, rotY: 90, variant: i + 12 });
  SLOT_LAYOUT.push({ x: 7.2, z, rotY: -90, variant: i + 18 });
}
const CARD_TABLE_LAYOUT = [
  { x: -4.3, z: 6.5, label: 'BJ' },
  { x: 4.3, z: 6.5, label: 'BJ' },
  { x: -4.3, z: 12.5, label: 'PKR' },
  { x: 4.3, z: 12.5, label: 'PKR' },
];

// ===== FLOOR (checkered marble) =====
const tileSize = 5;
for (let x = -RW/2; x < RW/2; x += tileSize) {
  for (let z = -RD/2; z < RD/2; z += tileSize) {
    const isWhite = (((x+RW/2)/tileSize) + ((z+RD/2)/tileSize)) % 2 === 0;
    makeBox('tile', [x+tileSize/2, 0, z+tileSize/2], [tileSize, 0.1, tileSize], isWhite ? matMarbleWhite : matMarbleBlack);
  }
}

// Red carpet with gold borders
makeBox('carpet', [0, 0.06, 0], [8, 0.04, RD-4], matRedCarpet);
makeBox('carpet-border-l', [-4.1, 0.07, 0], [0.4, 0.05, RD-4], matGold);
makeBox('carpet-border-r', [4.1, 0.07, 0], [0.4, 0.05, RD-4], matGold);

// ===== WALLS =====
makeBox('wall-back', [0, RH/2, -RD/2], [RW, RH, 0.4], matWall);
makeBox('wall-front', [0, RH/2, RD/2], [RW, RH, 0.4], matWall);
makeBox('wall-left', [-RW/2, RH/2, 0], [0.4, RH, RD], matWall);
makeBox('wall-right', [RW/2, RH/2, 0], [0.4, RH, RD], matWall);

// Ceiling
makeBox('ceiling', [0, RH, 0], [RW, 0.3, RD], matCeiling);

// Gold trim at top of walls
for (const [wallY] of [[RH - 1.5]]) {
  makeBox('trim-back', [0, wallY, -RD/2 + 0.3], [RW, 0.3, 0.5], matGold);
  makeBox('trim-front', [0, wallY, RD/2 - 0.3], [RW, 0.3, 0.5], matGold);
  makeBox('trim-left', [-RW/2 + 0.3, wallY, 0], [0.5, 0.3, RD], matGold);
  makeBox('trim-right', [RW/2 - 0.3, wallY, 0], [0.5, 0.3, RD], matGold);
}

// ===== NEON WALL STRIPS =====
for (let i = 0; i < 12; i++) {
  makeBox(`neon-back-${i}`, [-26 + i * 5, 9, -RD/2 + 0.35], [3, 0.12, 0.12], neonMats[i % 4]);
  makeBox(`neon-left-${i}`, [-RW/2 + 0.35, 9, -26 + i * 5], [0.12, 0.12, 3], neonMats[(i+1) % 4]);
  makeBox(`neon-right-${i}`, [RW/2 - 0.35, 9, -26 + i * 5], [0.12, 0.12, 3], neonMats[(i+2) % 4]);
}

// ===== CHANDELIERS =====
for (const [cx, cz] of [[-15,-15],[15,-15],[-15,15],[15,15],[0,0]]) {
  makeCylinder('chain', [cx, RH - 2, cz], [0.08, 3, 0.08], matGold);
  const bulb = makeSphere('chandelier', [cx, RH - 4, cz], [1.2, 1.2, 1.2], matGlowGold);
  for (let r = 0; r < 3; r++) {
    makeTorus('ch-ring', [cx, RH - 4 - r * 0.25, cz], [1 + r * 0.5, 1, 1 + r * 0.5], matGold, [90, 0, 0]);
  }
  // Point light (no shadows for performance)
  const cl = new pc.Entity('ch-light');
  cl.addComponent('light', { type: 'point', color: new pc.Color(1, 0.85, 0.5), intensity: 3, range: 35, castShadows: false });
  cl.setLocalPosition(cx, RH - 4, cz);
  app.root.addChild(cl);
}

// ===== SLOT MACHINES =====
const slotPrimitiveGroups = [];
const glbSlotEntities = [];
function makeSlotMachine(x, z, rotY, variant) {
  const cab = slotCabinets[variant % 4];
  const group = new pc.Entity('slot');
  group.setLocalPosition(x, 0, z);
  group.setLocalEulerAngles(0, rotY, 0);

  // Cabinet
  const body = makeBox('cab', [0, 1.6, 0], [1.4, 3.2, 1.1], cab.body);
  group.addChild(body);

  // Crown
  group.addChild(makeBox('crown', [0, 3.3, 0], [1.5, 0.3, 1.2], matGold));
  // Screen
  group.addChild(makeBox('screen', [0, 2.3, 0.58], [1.0, 0.8, 0.04], cab.screen));
  // Reels (3 glowing)
  for (let r = 0; r < 3; r++) {
    group.addChild(makeBox(`reel-${r}`, [-0.3 + r * 0.3, 1.5, 0.59], [0.22, 0.5, 0.03], neonMats[r % 4]));
  }
  // Coin slot
  group.addChild(makeBox('coin', [0, 0.9, 0.58], [0.35, 0.04, 0.04], matGold));
  // Base
  group.addChild(makeBox('base', [0, 0.15, 0], [1.5, 0.3, 1.2], matDarkWood));

const boundZ = CASINO_BOUNDS.maxZ;

app.on('update', (dt) => {
  time += dt;

  // Don't process movement when chat is open or game modal is active
  if (!chatMode && !activeGame) {
    const fwd = camera.forward;
    const right = camera.right;
    _tmpVec1.set(0, 0, 0);

    if (keys['KeyW'] || keys['ArrowUp']) { _tmpVec1.x += fwd.x; _tmpVec1.z += fwd.z; }
    if (keys['KeyS'] || keys['ArrowDown']) { _tmpVec1.x -= fwd.x; _tmpVec1.z -= fwd.z; }
    if (keys['KeyD'] || keys['ArrowRight']) { _tmpVec1.x += right.x; _tmpVec1.z += right.z; }
    if (keys['KeyA'] || keys['ArrowLeft']) { _tmpVec1.x -= right.x; _tmpVec1.z -= right.z; }

    const sprint = (keys['ShiftLeft'] || keys['ShiftRight']) ? 1.8 : 1;

    if (_tmpVec1.lengthSq() > 0) {
      _tmpVec1.normalize().mulScalar(speed * sprint * dt);
      camera.translate(_tmpVec1);
    }
  }

  const pos = camera.getLocalPosition();
  pos.x = Math.max(CASINO_BOUNDS.minX, Math.min(boundX, pos.x));
  pos.z = Math.max(CASINO_BOUNDS.minZ, Math.min(boundZ, pos.z));
  pos.y = 1.7;
  camera.setLocalPosition(pos);

  // Apply look rotation
  camera.setLocalEulerAngles(pitch * 180 / Math.PI, yaw * 180 / Math.PI, 0);

  // === GAME INTERACTION SYSTEM ===
  checkNearbyGames();
});

// ===== GAME INTERACTION SYSTEM =====
// Each interactive game registers its position + a handler
const interactiveObjects = [];
let nearbyGame = null;
let activeGame = null;

function registerGame(name, position, radius, openFn, options = {}) {
  interactiveObjects.push({ name, position: new pc.Vec3(position[0], position[1], position[2]), radius, openFn, ...options });
}

function checkNearbyGames() {
  if (activeGame) return; // Don't check while playing
  const playerPos = camera.getLocalPosition();
  let closest = null;
  let closestDist = Infinity;

  for (const game of interactiveObjects) {
    const dx = playerPos.x - game.position.x;
    const dz = playerPos.z - game.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const effectiveRadius = game.radius * (_isTouchDevice ? 1.35 : 1);
    if (dist < effectiveRadius && dist < closestDist) {
      closest = game;
      closestDist = dist;
    }
  }

  const prompt = document.getElementById('game-prompt');
  const mobilePlayBtn = document.getElementById('mobile-play-btn');
  if (closest) {
    nearbyGame = closest;
    prompt.style.display = 'block';
    document.getElementById('game-prompt-text').textContent = 'Play ' + closest.name;
    if (mobilePlayBtn) {
      mobilePlayBtn.style.display = _isTouchDevice ? 'block' : 'none';
      mobilePlayBtn.textContent = 'PLAY';
    }
  } else {
    nearbyGame = null;
    prompt.style.display = 'none';
    if (mobilePlayBtn) mobilePlayBtn.style.display = 'none';
  }
}

const mobilePlayBtn = document.getElementById('mobile-play-btn');
if (mobilePlayBtn) {
  mobilePlayBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (nearbyGame && !activeGame) openGameModal(nearbyGame);
  });
}

// E key to interact
document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyE' && nearbyGame && !activeGame) {
    e.preventDefault();
    openGameModal(nearbyGame);
  }
  if (e.code === 'Escape' && activeGame) {
    closeGameModal();
  }
});

function openGameModal(game) {
  activeGame = game;
  // Exit pointer lock so user can interact with modal / 3D controls.
  if (document.pointerLockElement) document.exitPointerLock();
  document.getElementById('game-prompt').style.display = 'none';
  const mobilePlayBtn = document.getElementById('mobile-play-btn');
  if (mobilePlayBtn) mobilePlayBtn.style.display = 'none';
  if (game.worldInteract) {
    game.openFn();
    return;
  }
  document.getElementById('game-modal').style.display = 'flex';
  document.getElementById('game-modal-title').textContent = game.name;
  game.openFn();
}

function closeGameModal() {
  activeGame = null;
  closeWorldSlotPanel();
  document.getElementById('game-modal').style.display = 'none';
  document.getElementById('game-modal-content').innerHTML = '';
}

let worldSlotPanel = null;

function closeWorldSlotPanel() {
  if (worldSlotPanel) {

  }
  worldSlotSpinning = false;

function makeSlotReelMat(index, glow = 1.8) {
  const colors = [0xffd700, 0x00e5ff, 0xff2d55, 0x7cff4d, 0xff8c00, 0xffffff, 0xb46bff, 0x00ffaa];
  const hex = colors[index % colors.length];
  return makeMat(rgb(hex), rgb(hex), glow, 0.2, 0.25);
}

function setReelVisual(entity, symbolIndex) {
  const mi = entity.model && entity.model.meshInstances && entity.model.meshInstances[0];
  if (mi) mi.material = makeSlotReelMat(symbolIndex);
  entity.setLocalEulerAngles(0, 0, symbolIndex * 45);
}

function openSlots(slotIndex) {
  if (worldSlotSpinning) return;
  closeWorldSlotPanel();
  const slot = SLOT_LAYOUT[slotIndex] || SLOT_LAYOUT[0];
  worldSlotPanel = new pc.Entity('world-slot-panel');
  worldSlotPanel.setLocalPosition(slot.x, 0, slot.z);
  worldSlotPanel.setLocalEulerAngles(0, slot.rotY, 0);

  const back = makeBox('slot-world-back', [0, 2.1, 0.72], [2.35, 1.65, 0.12], makeMat(rgb(0x050508), rgb(0x442200), 0.5, 0.2, 0.3));

  const resultLight = makeBox('slot-world-result', [0, 3.15, 0.88], [1.9, 0.18, 0.08], matGlowGold);
  worldSlotPanel.addChild(frame);
  worldSlotPanel.addChild(back);

  for (let r = 0; r < 3; r++) {
    const reel = makeBox('slot-world-reel-' + r, [-0.62 + r * 0.62, 2.1, 0.9], [0.46, 0.78, 0.10], makeSlotReelMat(r));
    worldSlotPanel.addChild(reel);
    worldSlotReels.push(reel);
  }
  const lever = makeCylinder('slot-world-lever', [1.48, 2.1, 0.85], [0.08, 0.65, 0.08], matGold);
  lever.setLocalEulerAngles(0, 0, 35);
  worldSlotPanel.addChild(lever);

  app.root.addChild(worldSlotPanel);
  spinWorldSlots();
}

async function spinWorldSlots() {
  if (worldSlotSpinning || !worldSlotPanel) return;
  worldSlotSpinning = true;
  const { result, hash, nonce } = await ProvablyFair.rollSlots(3, slotSymbols.length);
  const resultLight = worldSlotPanel.findByName('slot-world-result');
  let tick = 0;
  const spinTimer = setInterval(() => {
    tick++;
    for (let r = 0; r < 3; r++) {
      setReelVisual(worldSlotReels[r], Math.floor(Math.random() * slotSymbols.length));
      worldSlotReels[r].rotateLocal(0, 0, 35 + r * 8);
    }
    if (tick >= 28) {
      clearInterval(spinTimer);
      for (let r = 0; r < 3; r++) setReelVisual(worldSlotReels[r], result[r]);
      const jackpot = result[0] === result[1] && result[1] === result[2];
      const pair = result[0] === result[1] || result[1] === result[2] || result[0] === result[2];
      const mi = resultLight && resultLight.model && resultLight.model.meshInstances[0];
      if (mi) mi.material = jackpot ? matGlowGold : pair ? matGlowGreen : matGlowRed;
      console.log('[Slots 3D]', { result, nonce, hash: hash.slice(0, 16), jackpot, pair });
      setTimeout(() => {
        activeGame = null;
        closeWorldSlotPanel();
      }, 5200);
    }
  }, 70);
}

function loadContainerAsset(name, url, onReady) {
  const asset = new pc.Asset(name, 'container', { url });

function instantiateContainer(asset, name, pos, rot, scale) {
  let e;
  if (asset.resource && asset.resource.instantiateRenderEntity) {
    e = asset.resource.instantiateRenderEntity();
  } else if (asset.resource && asset.resource.instantiateModelEntity) {
    e = asset.resource.instantiateModelEntity();
  } else {
    console.warn('[Assets] No instantiate method for', asset.name);
    return null;
  }
  e.name = name;
  e.setLocalPosition(pos[0], pos[1], pos[2]);
  e.setLocalEulerAngles(rot[0], rot[1], rot[2]);
  e.setLocalScale(scale[0], scale[1], scale[2]);
  app.root.addChild(e);
  return e;
}

function hideLegacyEnvironmentPrimitives() {
  // Hide only the old hand-built architectural shell / set dressing. Keep game
  // entities and interaction markers alive so gameplay does not break while we
  // align each game to the imported casino scene in later passes.
  const exactNames = new Set([
    'tile', 'carpet', 'carpet-border-l', 'carpet-border-r',
    'wall-back', 'wall-front', 'wall-left', 'wall-right', 'ceiling',
    'trim-back', 'trim-front', 'trim-left', 'trim-right',
    'chain', 'chandelier', 'ch-ring', 'ch-light',
    'bar-top', 'bar-front',
    'pillar', 'pillar-base', 'pillar-cap',
    'arch-l', 'arch-r', 'arch-top',
    'stanchion', 'stanchion-cap', 'velvet-rope',
    'podium-ring', 'table-pit-carpet', 'inside-track-carpet',
    'table-lamp-chain', 'table-lamp-shade', 'table-lamp-glow',
    'slots-left-zone-strip', 'slots-right-zone-strip', 'inside-track-zone-strip'
  ]);
  const prefixNames = ['neon-', 'bottle-'];
  let hidden = 0;

  function shouldHide(entity) {
    const name = entity.name || '';
    return exactNames.has(name) || prefixNames.some(prefix => name.startsWith(prefix));
  }

  function walk(entity) {
    if (entity !== app.root && shouldHide(entity)) {
      entity.enabled = false;
      hidden++;
      return;
    }
    const children = entity.children || [];
    for (let i = 0; i < children.length; i++) walk(children[i]);
  }

  walk(app.root);
  window.__legacyEnvironmentHiddenCount = hidden;
  console.log('[Assets] Hidden legacy primitive environment entities:', hidden);
}

const WS_URL = 'wss://dimora3d.ir/casino-ws';
let ws = null;
let myPlayerId = null;
let myPlayerName = localStorage.getItem('casino-name') || ('Guest ' + Math.floor(Math.random() * 9999));

function connectMultiplayer() {
  try {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      console.log('[MP] Connected to server');
      ws.send(JSON.stringify({ type: 'name', name: myPlayerName }));
    };

    ws.onmessage = (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch (e) { return; }

      switch (msg.type) {
        case 'init':
          myPlayerId = msg.id;
          console.log('[MP] My ID:', myPlayerId);
          break;

        case 'existing':
          for (const p of msg.players) {
            spawnRemotePlayer(p.id, p.name, p.color, p.x, p.y, p.z, p.rot);
          }
          break;

        case 'join':
          if (msg.id !== myPlayerId) {
            spawnRemotePlayer(msg.id, msg.name, msg.color, 0, 1.7, 25, 0);
            addChatMessage('System', msg.name + ' joined the casino', '#ffd700');
          }
          break;

        case 'leave':
          removeRemotePlayer(msg.id);
          break;

        case 'move':
          updateRemotePlayer(msg.id, msg.x, msg.y, msg.z, msg.rot);
          break;

        case 'name':
          if (remotePlayers.has(msg.id)) {
            remotePlayers.get(msg.id).name = msg.name;
          }
          break;

        case 'chat':
          addChatMessage(msg.name, msg.message, msg.color);
          break;

        case 'players':
          document.getElementById('online-count').textContent = msg.list.length;
          break;
      }
    };

    ws.onclose = () => {
      console.log('[MP] Disconnected, retrying in 3s...');
      setTimeout(connectMultiplayer, 3000);
    };

    ws.onerror = (err) => {
      console.error('[MP] WS error', err);
    };
  } catch (e) {
    console.error('[MP] Connection failed', e);
  }
}

// === REMOTE PLAYER AVATARS ===
function spawnRemotePlayer(id, name, color, x, y, z, rot) {
  if (id === myPlayerId) return;
  if (remotePlayers.has(id)) return;

  const group = new pc.Entity('player-' + id);
  group.setLocalPosition(x, y, z);

  // Body capsule
  const body = new pc.Entity('p-body');
  body.addComponent('model', { type: 'capsule' });
  body.setLocalScale(0.6, 1.6, 0.6);
  body.setLocalPosition(0, 0.8, 0);
  const bodyMat = new pc.StandardMaterial();
  const c = hexToRgb(color);
  bodyMat.diffuse = new pc.Color(c[0], c[1], c[2]);
  bodyMat.emissive = new pc.Color(c[0] * 0.2, c[1] * 0.2, c[2] * 0.2);
  bodyMat.update();
  if (body.model.meshInstances[0]) body.model.meshInstances[0].material = bodyMat;
  group.addChild(body);

  // Head
  const head = new pc.Entity('p-head');
  head.addComponent('model', { type: 'sphere' });
  head.setLocalScale(0.35, 0.35, 0.35);
  head.setLocalPosition(0, 1.7, 0);
  if (head.model.meshInstances[0]) head.model.meshInstances[0].material = bodyMat;
  group.addChild(head);

  // Name tag (screen entity)
  const tag = new pc.Entity('p-tag');
  tag.addComponent('text', {
    text: name,
    fontSize: 0.3,
    color: new pc.Color(1, 1, 1),
    outlineThickness: 0.05,
    outlineColor: new pc.Color(0, 0, 0),
  });
  tag.setLocalPosition(0, 2.2, 0);
  group.addChild(tag);

  app.root.addChild(group);

  remotePlayers.set(id, {
    entity: group,
    name: name,
    color: color,
    x: x, y: y, z: z, rot: rot,
    targetX: x, targetY: y, targetZ: z, targetRot: rot,
  });
}

function removeRemotePlayer(id) {
  const rp = remotePlayers.get(id);
  if (rp) {
    rp.entity.destroy();
    remotePlayers.delete(id);
    addChatMessage('System', rp.name + ' left', '#888');
  }
}

function updateRemotePlayer(id, x, y, z, rot) {
  const rp = remotePlayers.get(id);
  if (rp) {
    rp.targetX = x;
    rp.targetY = y;
    rp.targetZ = z;
    rp.targetRot = rot;
  }
}

function hexToRgb(hex) {
  hex = hex.replace('#', '');
  return [parseInt(hex.substring(0, 2), 16) / 255, parseInt(hex.substring(2, 4), 16) / 255, parseInt(hex.substring(4, 6), 16) / 255];
}

// Interpolate remote players in update loop
const origUpdate = app.on.bind(app);
// We already have an update handler, let's add interpolation to it
app.on('update', (dt) => {
  for (const [id, rp] of remotePlayers) {
    const pos = rp.entity.getLocalPosition();
    pos.x += (rp.targetX - pos.x) * Math.min(1, dt * 10);
    pos.y += (rp.targetY - pos.y) * Math.min(1, dt * 10);
    pos.z += (rp.targetZ - pos.z) * Math.min(1, dt * 10);
    rp.entity.setLocalPosition(pos);
    // Smooth rotation
    const eulers = rp.entity.getLocalEulerAngles();
    let rotDiff = rp.targetRot - eulers.y;
    while (rotDiff > 180) rotDiff -= 360;
    while (rotDiff < -180) rotDiff += 360;
    rp.entity.setLocalEulerAngles(0, eulers.y + rotDiff * Math.min(1, dt * 10), 0);
  }
});

// Send position updates (10Hz)
setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN && myPlayerId !== null) {
    const pos = camera.getLocalPosition();
    const rot = camera.getLocalEulerAngles();
    ws.send(JSON.stringify({
      type: 'move',
      x: pos.x, y: pos.y, z: pos.z, rot: rot.y,
    }));
  }
}, 100);

// === CHAT (Press ENTER to chat) ===
let chatMode = false;

function addChatMessage(name, message, color) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  if (name === 'System') {
    div.classList.add('chat-system');
    div.textContent = message;
  } else {
    div.innerHTML = '<span class="chat-name" style="color:' + (color || '#fff') + '">' + escapeHtml(name) + '</span>: ' + escapeHtml(message);
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  while (msgs.children.length > 30) msgs.removeChild(msgs.firstChild);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function openChatInput() {
  chatMode = true;
  const row = document.getElementById('chat-input-row');
  row.classList.add('active');
  const hint = document.getElementById('chat-hint');
  hint.style.display = 'none';
  const input = document.getElementById('chat-input');
  input.focus();
  // Exit pointer lock so user can type
  if (document.pointerLockElement) document.exitPointerLock();
}

function closeChatInput() {
  chatMode = false;
  const row = document.getElementById('chat-input-row');
  row.classList.remove('active');
  document.getElementById('chat-hint').style.display = 'flex';
  document.getElementById('chat-input').value = '';
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (msg && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'chat', message: msg }));
  }
  closeChatInput();
}

// Global keydown for ENTER to open chat
document.addEventListener('keydown', (e) => {
  if (e.code === 'Enter' && !chatMode && !activeGame && isLocked) {
    e.preventDefault();
    openChatInput();
    return;
  }
  if (e.code === 'Enter' && chatMode) {
    e.preventDefault();
    sendChat();
    return;
  }
  if (e.code === 'Escape' && chatMode) {
    e.preventDefault();
    closeChatInput();
    return;
  }
});

// Click on hint also opens chat
document.getElementById('chat-hint').addEventListener('click', () => {
  if (!chatMode && !activeGame) openChatInput();
});

// Prevent game keybinds while typing in chat
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  e.stopPropagation();
});

// === MOBILE CONTROLS ===
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
let joystickVec = { x: 0, y: 0 };
let touchLook = { active: false, lastX: 0, lastY: 0 };

if (isTouch) {
  // Joystick
  const joyBase = document.getElementById('joystick-base');
  const joyKnob = document.getElementById('joystick-knob');
  let joyStart = null;

  joyBase.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = joyBase.getBoundingClientRect();
    joyStart = { cx: rect.left + rect.width / 2, cy: rect.top + rect.height / 2 };
  });

  joyBase.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!joyStart) return;
    const t = e.touches[0];
    let dx = t.clientX - joyStart.cx;
    let dy = t.clientY - joyStart.cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxDist = 40;
    if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
    joyKnob.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
    joystickVec.x = dx / maxDist;
    joystickVec.y = dy / maxDist;
  });

  joyBase.addEventListener('touchend', (e) => {
    e.preventDefault();
    joyKnob.style.transform = 'translate(-50%, -50%)';
    joystickVec.x = 0;
    joystickVec.y = 0;
    joyStart = null;
  });

  // Look area (right side drag)
  const lookArea = document.getElementById('look-area');
  lookArea.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    touchLook.active = true;
    touchLook.lastX = t.clientX;
    touchLook.lastY = t.clientY;
  });

  lookArea.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!touchLook.active) return;
    const t = e.touches[0];
    yaw -= (t.clientX - touchLook.lastX) * 0.004;
    pitch -= (t.clientY - touchLook.lastY) * 0.004;
    pitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, pitch));
    touchLook.lastX = t.clientX;
    touchLook.lastY = t.clientY;
  });

  lookArea.addEventListener('touchend', (e) => {
    touchLook.active = false;
  });

  // Override movement for touch
  // We'll apply joystick in the update loop via a global
  window._joystickVec = joystickVec;
}

// Apply joystick to movement in update loop
app.on('update', (dt) => {
  if (!chatMode && !activeGame && window._joystickVec && (window._joystickVec.x !== 0 || window._joystickVec.y !== 0)) {
    const fwd = camera.forward;
    const right = camera.right;
    const move = new pc.Vec3(0, 0, 0);
    move.x += fwd.x * -window._joystickVec.y + right.x * window._joystickVec.x;
    move.z += fwd.z * -window._joystickVec.y + right.z * window._joystickVec.x;
    if (move.lengthSq() > 0) {
      move.normalize().mulScalar(speed * dt);
      camera.translate(move);
      const pos = camera.getLocalPosition();
      pos.x = Math.max(CASINO_BOUNDS.minX, Math.min(CASINO_BOUNDS.maxX, pos.x));
      pos.z = Math.max(CASINO_BOUNDS.minZ, Math.min(CASINO_BOUNDS.maxZ, pos.z));
      pos.y = PLAYER_SPAWN.y;
      camera.setLocalPosition(pos);
    }
  }
});

// Connect to multiplayer
connectMultiplayer();

} catch(err) {
  window.onerror('Init failed', '', 0, 0, err);
}

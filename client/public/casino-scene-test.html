<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Casino Scene Asset Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#050508;font-family:system-ui,sans-serif;color:#fff}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:12px;left:12px;z-index:10;background:rgba(0,0,0,.65);border:1px solid rgba(255,215,0,.35);border-radius:10px;padding:10px 14px;max-width:440px;font-size:13px;line-height:1.45;backdrop-filter:blur(8px)}
#hud b{color:#ffd700}
#status{color:#8af}
#error{color:#ff6b6b;white-space:pre-wrap;margin-top:8px}
</style>
</head>
<body>
<canvas id="app"></canvas>
<div id="hud">
  <b>Casino Scene Asset Walk Test</b><br>
  Model: <code>/assets/models/casino-scene-katydid-web.glb</code><br>
  Controls: WASD walk · mouse drag look · Shift sprint<br>
  Status: <span id="status">booting…</span>
  <div id="error"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/playcanvas@1.75.0/build/playcanvas.min.js"></script>
<script>
const statusEl = document.getElementById('status');
const errorEl = document.getElementById('error');
function setStatus(msg){ statusEl.textContent = msg; console.log('[SceneTest]', msg); }
function setError(err){ errorEl.textContent = String(err && (err.stack || err.message) || err); console.error('[SceneTest]', err); }

const canvas = document.getElementById('app');
const app = new pc.Application(canvas, {
  mouse: new pc.Mouse(canvas),
  touch: new pc.TouchDevice(canvas),
  graphicsDeviceOptions: { antialias: true, alpha: false }
});
app.setCanvasFillMode(pc.FILLMODE_FILL_WINDOW);
app.setCanvasResolution(pc.RESOLUTION_AUTO);
app.graphicsDevice.maxPixelRatio = Math.min(window.devicePixelRatio || 1, 1.25);
window.addEventListener('resize', () => app.resizeCanvas());
app.scene.gammaCorrection = pc.GAMMA_SRGB;
app.scene.toneMapping = pc.TONEMAP_ACES;
app.scene.exposure = 1.1;
app.scene.ambientLight = new pc.Color(0.18,0.16,0.22);

const camera = new pc.Entity('camera');
camera.addComponent('camera', { clearColor: new pc.Color(0.03,0.03,0.05), fov: 65, farClip: 500 });
camera.setLocalPosition(0, 1.7, 22);
camera.setLocalEulerAngles(0, 180, 0);
app.root.addChild(camera);

const light = new pc.Entity('main-light');
light.addComponent('light', { type: 'directional', color: new pc.Color(1,0.9,0.72), intensity: 2.4, castShadows: false });
light.setLocalEulerAngles(-55, 35, 0);
app.root.addChild(light);

const fill = new pc.Entity('fill-light');
fill.addComponent('light', { type: 'omni', color: new pc.Color(1,0.55,0.2), intensity: 0.8, range: 60, castShadows: false });
fill.setLocalPosition(0, 8, 0);
app.root.addChild(fill);

// Raw Sketchfab bbox from gltf-transform inspect:
// min [-963.23657, -274.39905, -508.64249], max [-477.89661, -70.9584, 508.06219]
// Scale chosen so the full scene becomes roughly 19m x 8m x 41m.
const RAW_MIN = new pc.Vec3(-963.23657, -274.39905, -508.64249);
const RAW_MAX = new pc.Vec3(-477.89661, -70.9584, 508.06219);
const RAW_CENTER = new pc.Vec3().add2(RAW_MIN, RAW_MAX).mulScalar(0.5);
const SCALE = 0.04;
const FIX_POS = new pc.Vec3(-RAW_CENTER.x * SCALE, -RAW_MIN.y * SCALE, -RAW_CENTER.z * SCALE);

app.start();
setStatus('loading GLB…');

const keys = {};
let yaw = Math.PI;
let pitch = 0;
let dragging = false;
let lastX = 0;
let lastY = 0;
const tmpMove = new pc.Vec3();
document.addEventListener('keydown', (e) => { keys[e.code] = true; });
document.addEventListener('keyup', (e) => { keys[e.code] = false; });
canvas.addEventListener('mousedown', (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
document.addEventListener('mouseup', () => { dragging = false; });
document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  yaw -= dx * 0.004;
  pitch -= dy * 0.004;
  pitch = Math.max(-1.25, Math.min(1.25, pitch));
});

const asset = new pc.Asset('casino-scene-katydid-web', 'container', { url: '/assets/models/casino-scene-katydid-web.glb' });
app.assets.add(asset);
asset.ready(() => {
  try {
    const scene = asset.resource.instantiateRenderEntity ? asset.resource.instantiateRenderEntity() : asset.resource.instantiateModelEntity();
    scene.name = 'casino-scene-katydid-instance';
    scene.setLocalScale(SCALE, SCALE, SCALE);
    scene.setLocalPosition(FIX_POS);
    scene.setLocalEulerAngles(0, 0, 0);
    app.root.addChild(scene);
    window.__casinoSceneLoaded = true;
    window.__casinoSceneInfo = {
      scale: SCALE,
      fixPosition: [FIX_POS.x, FIX_POS.y, FIX_POS.z],
      rawMin: [RAW_MIN.x, RAW_MIN.y, RAW_MIN.z],
      rawMax: [RAW_MAX.x, RAW_MAX.y, RAW_MAX.z]
    };
    setStatus('loaded ✅ scale=' + SCALE + ' pos=' + FIX_POS.toString());
  } catch (e) {
    window.__casinoSceneLoaded = false;
    setError(e);
    setStatus('failed ❌');
  }
});
asset.on('error', (err) => {
  window.__casinoSceneLoaded = false;
  setError(err);
  setStatus('failed to load asset ❌');
});
app.assets.load(asset);

app.on('update', (dt) => {
  camera.setLocalEulerAngles(pitch * 180 / Math.PI, yaw * 180 / Math.PI, 0);
  tmpMove.set(0,0,0);
  const f = camera.forward;
  const r = camera.right;
  if (keys.KeyW || keys.ArrowUp) { tmpMove.x += f.x; tmpMove.z += f.z; }
  if (keys.KeyS || keys.ArrowDown) { tmpMove.x -= f.x; tmpMove.z -= f.z; }
  if (keys.KeyD || keys.ArrowRight) { tmpMove.x += r.x; tmpMove.z += r.z; }
  if (keys.KeyA || keys.ArrowLeft) { tmpMove.x -= r.x; tmpMove.z -= r.z; }
  if (tmpMove.lengthSq() > 0) {
    const sprint = (keys.ShiftLeft || keys.ShiftRight) ? 2 : 1;
    tmpMove.normalize().mulScalar(7 * sprint * dt);
    camera.translate(tmpMove);
  }
  const pos = camera.getLocalPosition();
  pos.y = 1.7;
  pos.x = Math.max(-30, Math.min(30, pos.x));
  pos.z = Math.max(-45, Math.min(45, pos.z));
  camera.setLocalPosition(pos);
});
</script>
</body>
</html>
